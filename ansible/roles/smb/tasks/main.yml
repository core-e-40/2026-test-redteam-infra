---
# roles/smb/tasks/main.yml
# Windows Server 2019 — File Server with SMB1 enabled (competition requirement)

# ── Join domain first
- name: Join domain
  win_domain_membership:
    dns_domain_name: "{{ ad_domain }}"
    domain_admin_user: "{{ ad_domain_netbios }}\\sjohnson"
    domain_admin_password: "UwU?OwO!67"
    state: domain
  register: smb_domain_join

- name: Reboot after domain join
  win_reboot:
    reboot_timeout: 300
    post_reboot_delay: 30
  when: smb_domain_join.reboot_required

# ── Install File Services
- name: Install FS-FileServer role
  win_feature:
    name: FS-FileServer
    state: present
    include_management_tools: true

- name: Install FS-SMB1 (for competition — SMBv1 attack surface)
  win_feature:
    name: FS-SMB1
    state: present

# ── Enable SMBv1 explicitly
- name: Enable SMBv1 protocol
  win_shell: Set-SmbServerConfiguration -EnableSMB1Protocol $true -Force

# ── Create share directories
- name: Create share directories
  win_file:
    path: "{{ item }}"
    state: directory
  loop:
    - C:\Shares\Public
    - C:\Shares\Confidential
    - C:\Shares\Archive
    - C:\Shares\ITDept

# ── Drop lure files in shares (red team bait / scoring artifacts)
- name: Create lure file in Public share
  win_copy:
    content: |
      SCP Foundation Internal Network
      Public file share — all staff read access
      Contact IT for access issues.
    dest: C:\Shares\Public\README.txt

- name: Create credentials lure in Confidential share
  win_copy:
    content: |
      SCP Foundation — IT Department
      Temporary service account credentials (rotate after onboarding)
      svcbackup : B@ckupSvc!2024
      svcprint   : Pr1nt3r$Acc
      Note: These are expired. Do not use.
    dest: C:\Shares\Confidential\IT-Temp-Creds.txt

- name: Create SMB shares
  community.windows.win_share:
    name: "{{ item.name }}"
    path: "{{ item.path }}"
    full: "Everyone"
    state: present
  loop:
    - { name: "Public",       path: "C:\\Shares\\Public" }
    - { name: "Confidential", path: "C:\\Shares\\Confidential" }
    - { name: "Archive",      path: "C:\\Shares\\Archive" }
    - { name: "ITDept",       path: "C:\\Shares\\ITDept" }

# ── Firewall — open SMB
- name: Open SMB firewall ports
  win_firewall_rule:
    name: "SMB Inbound"
    localport: "445,139"
    action: allow
    direction: in
    protocol: tcp
    state: present
    enabled: true
