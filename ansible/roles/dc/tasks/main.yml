# ── 9. DNS — add A records for all hosts
- name: Add DNS A records for all target machines
  ansible.windows.win_dns_record:
    name: "{{ item.name }}"
    type: A
    value: "{{ item.ip }}"
    zone: "{{ ad_domain }}"
    state: present
  loop:
    - { name: "SCP-DC-01",       ip: "10.10.10.21" }
    - { name: "SCP-SMB-01",      ip: "10.10.10.22" }
    - { name: "SCP-SMTP-01",     ip: "10.10.10.23" }
