---
# roles/dc/tasks/main.yml
# Promotes Windows Server 2022 to AD DC, creates all users

# ── 1. Install AD-DS feature
- name: Install AD Domain Services
  win_feature:
    name: AD-Domain-Services
    include_management_tools: true
    state: present
  register: ad_feature

- name: Reboot if AD-DS install requires it
  win_reboot:
  when: ad_feature.reboot_required

# ── 2. Promote to Domain Controller
- name: Promote server to Domain Controller
  microsoft.ad.domain:
    dns_domain_name: "{{ ad_domain }}"
    domain_netbios_name: "{{ ad_domain_netbios }}"
    safe_mode_password: "{{ ad_safe_mode_password }}"
    state: domain_controller
  register: dc_promotion

- name: Reboot after DC promotion
  win_reboot:
    reboot_timeout: 600
    post_reboot_delay: 60
  when: dc_promotion.reboot_required

# ── 3. Wait for AD web services to be ready
- name: Wait for AD DS web services
  win_service:
    name: ADWS
    state: started
  retries: 10
  delay: 15

# ── 4. Create Organizational Units
- name: Create Competition OU
  community.windows.win_domain_ou:
    name: "SCP Foundation"
    path: "DC=scp,DC=local"
    state: present

- name: Create Staff OU
  community.windows.win_domain_ou:
    name: "Staff"
    path: "OU=SCP Foundation,DC=scp,DC=local"
    state: present

- name: Create Admins OU
  community.windows.win_domain_ou:
    name: "Domain Admins"
    path: "OU=SCP Foundation,DC=scp,DC=local"
    state: present

- name: Create Service Accounts OU
  community.windows.win_domain_ou:
    name: "Service Accounts"
    path: "OU=SCP Foundation,DC=scp,DC=local"
    state: present

# ── 5. Create competition AD groups
- name: Create Staff group
  community.windows.win_domain_group:
    name: "SCP-Staff"
    scope: global
    path: "OU=Staff,OU=SCP Foundation,DC=scp,DC=local"
    state: present

- name: Create Domain Admins competition group
  community.windows.win_domain_group:
    name: "SCP-Admins"
    scope: global
    path: "OU=Domain Admins,OU=SCP Foundation,DC=scp,DC=local"
    state: present

